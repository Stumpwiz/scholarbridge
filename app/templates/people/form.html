{% extends "base.html" %}

{% if mode == "create" %}
    {% set heading = "Create Person" %}
{% else %}
    {% set heading = "Edit Person" %}
{% endif %}

{% block title %}{{ heading }} - {{ config.APP_NAME }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 col-lg-8">
        <h1 class="h4 mb-3">{{ heading }}</h1>

        <form method="post" novalidate>
            <div class="row">
                <div class="col-12 col-md-5 mb-3">
                    <label for="first_name" class="form-label">First Name</label>
                    <input
                        type="text"
                        class="form-control"
                        id="first_name"
                        name="first_name"
                        value="{{ form_data.first_name or '' }}"
                        required
                    >
                </div>
                <div class="col-12 col-md-2 mb-3">
                    <label for="middle_initial" class="form-label">Middle Initial</label>
                    <input
                        type="text"
                        class="form-control"
                        id="middle_initial"
                        name="middle_initial"
                        maxlength="1"
                        value="{{ form_data.middle_initial or '' }}"
                    >
                </div>
                <div class="col-12 col-md-5 mb-3">
                    <label for="last_name" class="form-label">Last Name</label>
                    <input
                        type="text"
                        class="form-control"
                        id="last_name"
                        name="last_name"
                        value="{{ form_data.last_name or '' }}"
                        required
                    >
                </div>
            </div>

            <div class="mb-3">
                <label for="preferred_name" class="form-label">Preferred Name</label>
                <input
                    type="text"
                    class="form-control"
                    id="preferred_name"
                    name="preferred_name"
                    value="{{ form_data.preferred_name or '' }}"
                >
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    value="{{ form_data.email or '' }}"
                >
            </div>

            <div class="row">
                <div class="col-12 col-md-6 mb-3">
                    <label for="mobile_phone" class="form-label">Mobile Phone</label>
                    <input
                        type="text"
                        class="form-control"
                        id="mobile_phone"
                        name="mobile_phone"
                        value="{{ form_data.mobile_phone or '' }}"
                    >
                </div>
                <div class="col-12 col-md-6 mb-3">
                    <label for="other_phone" class="form-label">Other Phone</label>
                    <input
                        type="text"
                        class="form-control"
                        id="other_phone"
                        name="other_phone"
                        value="{{ form_data.other_phone or '' }}"
                    >
                </div>
            </div>

            <div class="mb-3">
                <label for="committee_role" class="form-label">Committee Role</label>
                <input
                    type="text"
                    class="form-control"
                    id="committee_role"
                    name="committee_role"
                    value="{{ form_data.committee_role or '' }}"
                >
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <textarea
                    class="form-control"
                    id="notes"
                    name="notes"
                    rows="4"
                >{{ form_data.notes or '' }}</textarea>
            </div>

            <div class="form-check mb-3">
                <input
                    class="form-check-input"
                    type="checkbox"
                    value="on"
                    id="is_active"
                    name="is_active"
                    {% if form_data.is_active %}checked{% endif %}
                >
                <label class="form-check-label" for="is_active">
                    Active person
                </label>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save</button>
                <a class="btn btn-outline-secondary" href="{{ url_for('main.person_list') }}">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
