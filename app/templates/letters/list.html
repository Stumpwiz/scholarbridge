{% extends "base.html" %}

{% block title %}Letters - {{ config.APP_NAME }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0">Letters</h1>
        </div>

        <div class="card">
            <div class="card-body">
                <h2 class="h6 mb-3">Solicitation PDF Demo</h2>
                <form method="get" action="{{ url_for('main.letter_solicitation_pdf') }}">
                    <div class="mb-3">
                        <label class="form-label" for="partner_id">Partner</label>
                        <select class="form-select" id="partner_id" name="partner_id" required>
                            <option value="">Select partner</option>
                            {% for partner in partners %}
                                <option value="{{ partner.id }}" {% if selected_partner_id == partner.id %}selected{% endif %}>
                                    {{ partner.display_name or partner.partner_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary" formtarget="_blank">View PDF</button>
                        <button type="submit" name="download" value="1" class="btn btn-outline-secondary">Download PDF</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
