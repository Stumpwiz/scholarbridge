name: CI/CD

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scholarbridge
          POSTGRES_PASSWORD: scholarbridge
          POSTGRES_DB: scholarbridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://scholarbridge:scholarbridge@localhost:5432/scholarbridge_test
      FLASK_APP: run.py

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Create instance directory
        run: mkdir -p instance

      - name: Run migrations
        run: uv run flask db upgrade

      - name: Run tests
        run: |
          uv run pytest -q
          bash tests/test_runtime_asset_manifest.sh

  deploy:
    name: Deploy To Production
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SCHOLARBRIDGE_PROD_SSH_PRIVATE_KEY }}

      - name: Configure known_hosts
        env:
          SCHOLARBRIDGE_PROD_SSH_KNOWN_HOSTS: ${{ secrets.SCHOLARBRIDGE_PROD_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SCHOLARBRIDGE_PROD_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.SCHOLARBRIDGE_PROD_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.SCHOLARBRIDGE_PROD_SSH_USER }}
          DEPLOY_SSH_PORT: ${{ secrets.SCHOLARBRIDGE_PROD_SSH_PORT }}
          DEPLOY_PATH: /opt/scholarbridge
          DEPLOY_STAGING_PATH: /tmp/scholarbridge-release
          DEPLOY_APP_USER: scholarbridge
          DEPLOY_SERVICE: scholarbridge.service
          DEPLOY_ENV_FILE: /etc/scholarbridge/scholarbridge.env
          DEPLOY_HEALTHCHECK_URL: http://127.0.0.1:8000/health
        run: bash scripts/deploy_via_ssh.sh
