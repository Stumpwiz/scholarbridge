name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scholarbridge
          POSTGRES_PASSWORD: scholarbridge
          POSTGRES_DB: scholarbridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://scholarbridge:scholarbridge@localhost:5432/scholarbridge_test
      FLASK_APP: run.py

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Create instance directory
        run: mkdir -p instance

      - name: Run migrations
        run: uv run flask db upgrade

      - name: Run tests
        run: uv run python -m unittest discover -s tests
